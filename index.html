<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบติดตามรถ: ขับบนถนนจริง พร้อมบันทึกพิกัด</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background-color: #f4f6f9; }
        #sidebar { width: 340px; background-color: white; box-shadow: 2px 0 10px rgba(0,0,0,0.15); display: flex; flex-direction: column; z-index: 1000; }
        .header { padding: 20px; background-color: #1e272e; color: white; text-align: center; }
        .vehicle-item { padding: 15px 20px; border-bottom: 1px solid #f1f2f6; display: flex; align-items: center; justify-content: space-between; background-color: #eaf2f8; border-left: 4px solid #3498db; }
        .vehicle-info { display: flex; flex-direction: column; }
        .vehicle-type-label { font-size: 0.75rem; color: #7f8c8d; margin-top: 2px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
        .status-moving { background-color: #0be881; }
        .status-stopped { background-color: #ff3f34; }
        .trip-info { padding: 15px 20px; background-color: #f8f9fa; font-size: 0.85rem; color: #2c3e50; line-height: 1.8; flex-grow: 1; }
        
        /* สไตล์สำหรับปุ่มดาวน์โหลด */
        .btn-download {
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .btn-download:hover { background-color: #2ecc71; }
        .btn-download:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        #map { flex-grow: 1; height: 100%; }
        .vehicle-icon-svg { filter: drop-shadow(0px 3px 4px rgba(0,0,0,0.4)); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h2 style="margin: 0; font-size: 1.2rem; letter-spacing: 1px;">ระบบติดตามรถ (เวลาจริง)</h2>
        </div>
        <div class="vehicle-item">
            <div class="vehicle-info">
                <span style="font-weight: bold; color: #2c3e50;">รถยนต์ VIP (V-001)</span>
                <span class="vehicle-type-label">ศรีราชา ➔ ถนนสุขุมวิท ➔ อโศก</span>
            </div>
            <span class="status-dot status-moving" id="status-indicator"></span>
        </div>
        <div class="trip-info">
            <b>ข้อมูลการเดินทางแบบเรียลไทม์:</b><br>
            ความเร็วรถ: <span id="speed-display" style="font-weight:bold; color:#2980b9;">100</span> กม./ชม.<br>
            สถานะ: <span id="text-status" style="color: #0be881; font-weight:bold;">กำลังดึงข้อมูลเส้นทาง...</span><br>
            <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
            <b>ระบบบันทึกพิกัด (Log):</b><br>
            จำนวนข้อมูลที่เก็บ: <span id="log-count" style="color:#e67e22; font-weight:bold;">0</span> record(s)<br>
            
            <button id="download-btn" class="btn-download" disabled>📥 ดาวน์โหลดไฟล์ .txt</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([13.1627, 100.9265], 16);
        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors', maxZoom: 19
        }).addTo(map);

        const waypoints = [
            "100.9300,13.1667", // ศรีราชา
            "100.9238,13.2847", // บางแสน
            "100.9785,13.3644", // ชลบุรี
            "101.0029,13.5435", // บางปะกง
            "100.5966,13.5959", // สมุทรปราการ
            "100.6095,13.6705", // บางนา
            "100.5606,13.7368"  // อโศก กทม.
        ].join(";");

        let routeCoords = []; 
        let currentRouteIndex = 0;
        let carPos = null;
        let vehicleMarker = null;
        let fullRoutePolyline = null;
        let passedPolyline = null;
        let passedCoords = [];
        let isDriving = false;
        let currentHeading = 0;

        // 1. ตัวแปรสำหรับเก็บข้อมูล Log ทุกๆ 1 วินาที
        const locationLogs = [];

        function createCarIcon(heading) {
            const svgContent = `
                <svg class="vehicle-icon-svg" viewBox="0 0 24 24" width="36" height="36">
                    <rect x="4" y="2" width="16" height="20" rx="4" fill="#00a8ff"/>
                    <path d="M5.5,7 L18.5,7 L17,14 L7,14 Z" fill="#2f3640"/>
                    <rect x="6" y="8" width="12" height="5" rx="1" fill="#00a8ff"/>
                    <rect x="5" y="2" width="3" height="1.5" rx="0.5" fill="#fbc531"/>
                    <rect x="16" y="2" width="3" height="1.5" rx="0.5" fill="#fbc531"/>
                    <rect x="5" y="20.5" width="3" height="1.5" rx="0.5" fill="#e84118"/>
                    <rect x="16" y="20.5" width="3" height="1.5" rx="0.5" fill="#e84118"/>
                    <path d="M4,9 L2,10 L4,11 Z" fill="#00a8ff"/>
                    <path d="M20,9 L22,10 L20,11 Z" fill="#00a8ff"/>
                </svg>
            `;
            return L.divIcon({
                className: 'vehicle-icon-container',
                html: `<div style="transform: rotate(${heading}deg);">${svgContent}</div>`,
                iconSize: [40, 40], iconAnchor: [20, 20]
            });
        }

        async function fetchRealRoute() {
            try {
                const url = `https://router.project-osrm.org/route/v1/driving/${waypoints}?geometries=geojson&overview=full`;
                const response = await fetch(url);
                const data = await response.json();

                routeCoords = data.routes[0].geometry.coordinates.map(coord => L.latLng(coord[1], coord[0]));
                fullRoutePolyline = L.polyline(routeCoords, { color: '#bdc3c7', weight: 5, opacity: 0.5 }).addTo(map);
                passedPolyline = L.polyline([], { color: '#9b59b6', weight: 5, opacity: 0.9 }).addTo(map);

                carPos = routeCoords[0];
                document.getElementById('text-status').innerText = "กำลังวิ่งบนถนนสุขุมวิท...";
                document.getElementById('download-btn').disabled = false; // เปิดใช้งานปุ่มดาวน์โหลด
                
                // เขียนหัวคอลัมน์ของไฟล์ Log ไว้เป็นบรรทัดแรก
                locationLogs.push("Timestamp,Latitude,Longitude,Speed_kmh,Heading_deg");
                
                isDriving = true;
                startSimulation();
                startLogging(); // เรียกใช้ฟังก์ชันเก็บข้อมูล
            } catch (error) {
                document.getElementById('text-status').innerText = "เกิดข้อผิดพลาดในการโหลดเส้นทาง";
                document.getElementById('text-status').style.color = "#e74c3c";
            }
        }

        function getPointAtDistance(p1, p2, distMeter) {
            const totalDist = map.distance(p1, p2);
            if (totalDist === 0) return p1;
            const ratio = distMeter / totalDist;
            const lat = p1.lat + (p2.lat - p1.lat) * ratio;
            const lng = p1.lng + (p2.lng - p1.lng) * ratio;
            return L.latLng(lat, lng);
        }

        function calculateHeading(p1, p2) {
            const dLng = p2.lng - p1.lng;
            const dLat = p2.lat - p1.lat;
            let heading = Math.atan2(dLng, dLat) * (180 / Math.PI);
            return (heading >= 0) ? heading : heading + 360;
        }

        function startSimulation() {
            const targetSpeedKmh = 100; 
            const speedMetersPerSecond = targetSpeedKmh * (1000 / 3600); // ≈ 27.77 m/s
            const tickRateMs = 50; // อัปเดต UI ทุกๆ 50ms เพื่อให้ภาพสมูท

            setInterval(() => {
                if (!isDriving) return;

                // ระยะทางที่จะต้องขยับในรอบ 50ms (ไม่มีตัวเร่งเวลาแล้ว วิ่งตามจริง 100% เรียลไทม์)
                let distanceToMove = speedMetersPerSecond * (tickRateMs / 1000);

                while (distanceToMove > 0 && currentRouteIndex < routeCoords.length - 1) {
                    let nextPoint = routeCoords[currentRouteIndex + 1];
                    let distToNext = map.distance(carPos, nextPoint);

                    if (distanceToMove < distToNext) {
                        currentHeading = calculateHeading(carPos, nextPoint);
                        carPos = getPointAtDistance(carPos, nextPoint, distanceToMove);
                        distanceToMove = 0; 
                    } else {
                        distanceToMove -= distToNext;
                        currentRouteIndex++;
                        carPos = routeCoords[currentRouteIndex];
                    }
                }

                if (currentRouteIndex >= routeCoords.length - 1) {
                    isDriving = false;
                    document.getElementById('speed-display').innerText = "0";
                    document.getElementById('text-status').innerText = "ถึงจุดหมายเรียบร้อย";
                    document.getElementById('text-status').style.color = "#ff3f34";
                    document.getElementById('status-indicator').className = "status-dot status-stopped";
                }

                passedCoords.push([carPos.lat, carPos.lng]);
                if(passedCoords.length > 2000) passedCoords.shift(); // กันเมมโมรี่เต็ม
                passedPolyline.setLatLngs(passedCoords);

                if (!vehicleMarker) {
                    vehicleMarker = L.marker([carPos.lat, carPos.lng], { icon: createCarIcon(currentHeading) }).addTo(map);
                } else {
                    vehicleMarker.setLatLng([carPos.lat, carPos.lng]);
                    vehicleMarker.setIcon(createCarIcon(currentHeading));
                }

                map.panTo([carPos.lat, carPos.lng]); 

            }, tickRateMs);
        }

        // 2. ฟังก์ชันบันทึกข้อมูลแบบเบื้องหลัง (ทุกๆ 1 วินาที)
        function startLogging() {
            setInterval(() => {
                if (!isDriving || !carPos) return;

                // สร้างรูปแบบข้อมูล: เวลา, ละติจูด, ลองจิจูด, ความเร็ว, องศา
                const now = new Date().toISOString(); // เช่น 2026-06-21T07:20:51.000Z
                const logEntry = `${now},${carPos.lat.toFixed(6)},${carPos.lng.toFixed(6)},100,${currentHeading.toFixed(2)}`;
                
                locationLogs.push(logEntry);
                
                // อัปเดตตัวเลขบนหน้าจอ
                document.getElementById('log-count').innerText = locationLogs.length - 1; // ลบ 1 เพราะแถวแรกเป็น Header

            }, 1000); // ทำงานทุกๆ 1,000 มิลลิวินาที (1 วินาที)
        }

        function createCameraPopup(id) {
    // ในที่นี้สมมติว่าคุณมีลิงก์ Stream ของกล้อง (เปลี่ยน URL ตรงนี้ได้)
    // การใช้ iframe เหมาะสำหรับการแสดงผล YouTube Live หรือ Embed Stream ทั่วไป
    const cameraUrl = "https://www.youtube.com/watch?v=TTIxshuinb8"; 
    
    return `
        <div style="text-align:center; min-width: 250px;">
            <h4 style="margin:5px 0;">รถ: ${id}</h4>
            <div style="background:black; width:100%; height:150px; display:flex; align-items:center; justify-content:center; color:white;">
                <iframe width="100%" height="150" src="${cameraUrl}" frameborder="0" allowfullscreen></iframe>
            </div>
            <p style="font-size:0.8rem; margin-top:5px; color:#555;">กำลังเชื่อมต่อกล้องสด...</p>
        </div>
    `;
}

// ในฟังก์ชัน startSimulation (หรือจุดที่สร้าง Marker) ให้ผูก Popup เข้าไป
// แก้ไขส่วนนี้ในฟังก์ชัน startSimulation:
if (!vehicleMarker) {
    vehicleMarker = L.marker([carPos.lat, carPos.lng], { icon: createCarIcon(currentHeading) }).addTo(map);
    // ผูก Popup ที่เรียกฟังก์ชัน createCameraPopup
    vehicleMarker.bindPopup(createCameraPopup("V-001"));
} else {
    vehicleMarker.setLatLng([carPos.lat, carPos.lng]);
    vehicleMarker.setIcon(createCarIcon(currentHeading));
}

        // 3. ฟังก์ชันสร้างไฟล์ .txt และสั่งดาวน์โหลดเมื่อกดปุ่ม
        document.getElementById('download-btn').addEventListener('click', () => {
            if (locationLogs.length <= 1) {
                alert("ยังไม่มีข้อมูลพิกัดให้บันทึก");
                return;
            }

            // แปลง Array ของข้อมูลให้เป็นก้อนไฟล์ Text (แบ่งบรรทัดด้วย \n)
            const logContent = locationLogs.join('\n');
            const blob = new Blob([logContent], { type: 'text/plain;charset=utf-8' });
            
            // สร้างลิงก์ชั่วคราวเพื่อสั่งดาวน์โหลด
            const downloadLink = document.createElement('a');
            downloadLink.href = URL.createObjectURL(blob);
            
            // ตั้งชื่อไฟล์ (ระบุวันที่-เวลาเพื่อไม่ให้ชื่อซ้ำกัน)
            const dateStr = new Date().toISOString().replace(/[:.]/g, '-').slice(0,19);
            downloadLink.download = `truck_tracking_log_${dateStr}.txt`;
            
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        });

        fetchRealRoute();

    </script>
</body>
</html>
